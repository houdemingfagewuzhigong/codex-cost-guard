name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        run: python3 -m unittest discover -s tests -q
      - name: Build SARIF sample
        run: python3 codex_cost_guard.py demo --sarif codex-cost-guard.sarif || true
